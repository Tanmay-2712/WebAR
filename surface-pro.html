<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAR - Surface Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="overlay">
        <header style="margin-top: 5vh;">
            <h1>SURFACE</h1>
        </header>

        <!-- Subtle Status -->
        <div id="system-status">
            <div id="status-dot" class="status-dot"></div>
            <span id="status-text">INITIALIZING</span>
        </div>

        <div id="instructions" class="panel" style="background: none; border: none; backdrop-filter: none; box-shadow: none;">
            <p id="instruction-text" style="font-size: 0.7rem; letter-spacing: 2px;">SCANNING ENVIRONMENT</p>
        </div>

        <div id="controls" class="hidden" style="margin: auto; pointer-events: auto;">
            <button id="ar-button" class="premium-btn">START SESSION</button>
        </div>
        
        <div id="ar-status" class="hidden">
            <p id="hit-status" style="position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); font-size: 0.6rem; letter-spacing: 3px; opacity: 0.5;">FLOOR DETECTED</p>
        </div>

        <a href="index.html" class="exit-btn">EXIT SESSION</a>
    </div>

    <script type="module" src="surface-pro.js"></script>
</body>
</html>
