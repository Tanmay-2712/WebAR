<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAR - Minimal Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="overlay">
        <header>
            <p>WEBAR SUITE v3.0</p>
            <h1>PRO <span class="accent">AR</span></h1>
        </header>

        <div class="hub-layout">
            <div class="mode-card" onclick="location.href='surface-pro.html'">
                <div class="icon">◎</div>
                <div class="card-content">
                    <h3>SURFACE</h3>
                </div>
            </div>

            <div class="mode-card" onclick="location.href='card-tracking.html'">
                <div class="icon">❒</div>
                <div class="card-content">
                    <h3>CARD</h3>
                </div>
            </div>
        </div>

        <footer style="text-align: center; opacity: 0.1; font-size: 0.6rem; letter-spacing: 5px;">
            STABLE ENGINE READY
        </footer>
    </div>

    <!-- Hidden background app container -->
    <div id="app" class="hidden"></div>
</body>
</html>
