<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAR - Card Master</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: transparent !important; }
        #app { background: transparent !important; }
    </style>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
    <div id="overlay">
        <header>
            <h1>Card <span class="accent">Master</span></h1>
            <p>Targeting System Active</p>
        </header>

        <div id="scan-feedback" class="panel">
            <div class="loader-ring"></div>
            <p>Scanning for Visual Anchor...</p>
            <a href="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.png" target="_blank" style="color: var(--primary); font-size: 0.8rem; margin-top: 15px; display: block; text-decoration: none; border-bottom: 1px dashed var(--primary); width: fit-content; margin-left: auto; margin-right: auto;">View Target Card</a>
        </div>

        <a href="index.html" class="exit-btn">&larr; Return to Hub</a>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="avatarModel" src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <!-- Model without auto-rotation -->
            <a-gltf-model 
                src="#avatarModel" 
                rotation="0 0 0" 
                position="0 0 0.1" 
                scale="0.1 0.1 0.1"
                shadow="cast: true; receive: true">
            </a-gltf-model>
            
            <!-- Virtual Shadow Plane -->
            <a-plane color="#000" opacity="0.5" position="0 0 0" rotation="0 0 0" width="1" height="1" shadow="receive: true"></a-plane>
        </a-entity>
    </a-scene>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const sceneEl = document.querySelector('a-scene');
            sceneEl.addEventListener("arReady", (event) => {
                console.log("MindAR is ready");
                document.getElementById('scan-feedback').querySelector('.loader-ring').classList.add('hidden');
                document.getElementById('scan-feedback').querySelector('p').innerText = "Targeting System Active";
            });
            
            sceneEl.addEventListener("targetFound", (event) => {
                console.log("Target found");
                document.getElementById('scan-feedback').classList.add('hidden');
            });
            
            sceneEl.addEventListener("targetLost", (event) => {
                console.log("Target lost");
                document.getElementById('scan-feedback').classList.remove('hidden');
            });
        });
    </script>
</body>
</html>
