<!DOCTYPE html>
<html lang="en" class="ar-mode">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebAR - Card Precision Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"></script>
    <style>
        #container {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
            background: transparent;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden; background: #000;">
    <div id="container">
        <!-- Overlay Layer -->
        <div id="overlay" style="z-index: 100;">
            <header style="margin-top: 5vh;">
                <h1>CARD</h1>
            </header>

            <div id="system-status">
                <div id="status-dot" class="status-dot"></div>
                <span id="status-text">INITIALIZING</span>
            </div>

            <div id="scan-frame" class="scan-guideline" style="border-color: rgba(0, 242, 255, 0.2); border-width: 1px;"></div>
            
            <div id="mobile-instruction">
                <span id="instruction-text">ALIGN CARD</span>
            </div>

            <a href="index.html" class="exit-btn">EXIT SESSION</a>
        </div>
    </div>

    <script type="module">
        import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/loaders/GLTFLoader.js';

        const mindarThree = new window.MINDAR.IMAGE.MindARThree({
            container: document.querySelector("#container"),
            imageTargetSrc: 'https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind',
            filterMinCF: 0.0001,
            filterBeta: 0.001
        });

        const {renderer, scene, camera} = mindarThree;

        const anchor = mindarThree.addAnchor(0);
        const loader = new GLTFLoader();

        // Lighting
        const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
        scene.add(light);

        loader.load('https://modelviewer.dev/shared-assets/models/Astronaut.glb', (gltf) => {
            const model = gltf.scene;
            model.scale.set(0.1, 0.1, 0.1);
            model.rotation.set(0, 0, 0);
            anchor.group.add(model);
        });

        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const scanFrame = document.getElementById('scan-frame');
        const instructionText = document.getElementById('instruction-text');

        const triggerHaptic = (type = 'success') => {
            if (window.navigator && window.navigator.vibrate) {
                if (type === 'success') window.navigator.vibrate([40, 30, 40]);
                else if (type === 'ready') window.navigator.vibrate(20);
            }
        };

        anchor.onTargetFound = () => {
            statusText.innerText = "LOCKED";
            statusDot.classList.add('active');
            scanFrame.classList.add('edge-lock-active');
            instructionText.classList.add('hidden');
            triggerHaptic('success');
            
            // Auto-hide scan frame after 2 seconds for a clean look
            setTimeout(() => {
                if (statusText.innerText === "LOCKED") {
                    scanFrame.classList.add('hidden');
                }
            }, 2000);
        };

        anchor.onTargetLost = () => {
            statusText.innerText = "SEARCHING";
            statusDot.classList.remove('active');
            scanFrame.classList.remove('edge-lock-active');
            scanFrame.classList.remove('hidden');
            instructionText.classList.remove('hidden');
        };

        const start = async () => {
            try {
                await mindarThree.start();
                statusText.innerText = "READY";
                renderer.setAnimationLoop(() => {
                    renderer.render(scene, camera);
                });
                triggerHaptic('ready');
            } catch (err) {
                console.error("MindAR Start Error:", err);
                statusText.innerText = "ERROR";
            }
        };

        start();
    </script>
</body>
</html>
