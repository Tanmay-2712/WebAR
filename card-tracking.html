<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAR - Card Precision</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Mind-AR & A-Frame -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { background: transparent !important; }
        .ar-ready-text {
            color: var(--primary);
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
            font-weight: 600;
        }
        .pulse {
            animation: pulse-animation 2s infinite;
        }
        @keyframes pulse-animation {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="overlay">
        <header>
            <h1>Card <span class="accent">Precision</span></h1>
            <p id="system-status">Initializing Neural Tracking...</p>
        </header>

        <div id="scan-feedback" class="panel">
            <div class="loader-ring"></div>
            <h3>Scanning for Visual Anchor</h3>
            <p>Align the physical card within the viewport</p>
            <a href="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.png" target="_blank" class="premium-btn" style="display: inline-block; font-size: 0.7rem; padding: 0.6rem 1.2rem; text-decoration: none; margin-top: 1rem;">View Target Image</a>
        </div>

        <div id="tracking-stats" class="hidden" style="position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); background: var(--glass); padding: 10px 20px; border-radius: 20px; border: 1px solid var(--primary); color: var(--primary); font-size: 0.8rem; backdrop-filter: blur(10px); z-index: 1000; pointer-events: none;">
            <span class="pulse">●</span> TARGET LOCKED
        </div>

        <a href="index.html" class="exit-btn">&larr; Return to Hub</a>
    </div>

    <!-- AR Scene -->
    <a-scene 
        mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights: true" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="avatarModel" src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;"></a-camera>

        <!-- Target Entity -->
        <a-entity mindar-image-target="targetIndex: 0">
            <!-- Model with subtle entrance animation -->
            <a-gltf-model 
                src="#avatarModel" 
                rotation="0 0 0" 
                position="0 0 0.1" 
                scale="0.1 0.1 0.1"
                animation="property: scale; from: 0 0 0; to: 0.1 0.1 0.1; dur: 1000; easing: easeOutElastic"
                shadow="cast: true; receive: true">
            </a-gltf-model>
            
            <!-- Tracking Ring Decoration -->
            <a-ring color="#00f2ff" radius-inner="0.45" radius-outer="0.5" rotation="0 0 0" opacity="0.5"
                    animation="property: scale; from: 0.8 0.8 1; to: 1.1 1.1 1; dir: alternate; dur: 2000; loop: true"></a-ring>
            
            <!-- Virtual Shadow Plane -->
            <a-plane color="#000" opacity="0.3" position="0 0 0" rotation="0 0 0" width="1" height="1" shadow="receive: true"></a-plane>
        </a-entity>
    </a-scene>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const sceneEl = document.querySelector('a-scene');
            const statusText = document.getElementById('system-status');
            const feedbackPanel = document.getElementById('scan-feedback');
            const trackingStats = document.getElementById('tracking-stats');
            
            sceneEl.addEventListener("arReady", (event) => {
                statusText.innerText = "Tracking System Active";
                statusText.classList.add('ar-ready-text');
            });
            
            sceneEl.addEventListener("targetFound", (event) => {
                console.log("Target Locked");
                feedbackPanel.classList.add('hidden');
                trackingStats.classList.remove('hidden');
                statusText.innerText = "Visual Anchor Locked";
            });
            
            sceneEl.addEventListener("targetLost", (event) => {
                console.log("Target Lost");
                feedbackPanel.classList.remove('hidden');
                trackingStats.classList.add('hidden');
                statusText.innerText = "Scanning for Anchor...";
            });

            // Error handling
            sceneEl.addEventListener("arError", (event) => {
                statusText.innerText = "Hardware Integration Error";
                statusText.style.color = "#ff4b4b";
            });
        });
    </script>
</body>
</html>
